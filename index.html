<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Hetekraan — Planning</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --surface2: #1a1a24;
    --surface3: #22222f;
    --border: #2a2a3a;
    --accent: #ff6b35;
    --accent2: #00d4aa;
    --blue: #4a9eff;
    --text: #e8e8f0;
    --muted: #666680;
    --reparatie: #ff6b35;
    --onderhoud: #00d4aa;
    --installatie: #4a9eff;
    --klaar-bg: #0d2018;
    --klaar-border: #1a4030;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* HEADER */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 16px;
    height: 56px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
    gap: 8px;
  }

  .logo {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 16px;
    letter-spacing: -0.5px;
    flex-shrink: 0;
  }
  .logo span { color: var(--accent); }

  .date-nav {
    display: flex;
    align-items: center;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    flex-shrink: 0;
  }
  .date-nav button {
    background: none;
    border: none;
    color: var(--muted);
    padding: 8px 10px;
    cursor: pointer;
    font-size: 14px;
    transition: color 0.15s;
    flex-shrink: 0;
  }
  .date-nav button:hover { color: var(--text); }
  .date-label {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 11px;
    padding: 8px 10px;
    border-left: 1px solid var(--border);
    border-right: 1px solid var(--border);
    letter-spacing: 0.5px;
    width: 180px;
    text-align: center;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .header-stats { display: flex; gap: 12px; align-items: center; flex-shrink: 0; }
  .stat { display: flex; flex-direction: column; align-items: center; }
  .stat-val { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 16px; line-height: 1; }
  .stat-val.green { color: var(--accent2); }
  .stat-val.orange { color: var(--accent); }
  .stat-label { font-size: 8px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-top: 2px; }

  /* LAYOUT */
  .layout {
    display: grid;
    grid-template-columns: 1fr 280px;
    height: calc(100vh - 56px);
  }

  .appointments {
    padding: 16px;
    overflow-y: auto;
    border-right: 1px solid var(--border);
  }

  .appointments-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
  }

  .section-title {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 2px;
  }

  .btn-add {
    background: var(--accent);
    color: white;
    border: none;
    padding: 7px 14px;
    border-radius: 6px;
    font-family: 'DM Sans', sans-serif;
    font-weight: 500;
    font-size: 12px;
    cursor: pointer;
    transition: opacity 0.15s;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .btn-add:hover { opacity: 0.85; }

  /* KAART */
  .appt-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    margin-bottom: 8px;
    overflow: hidden;
    transition: border-color 0.2s, transform 0.15s;
    position: relative;
  }
  .appt-card:hover { border-color: var(--surface3); transform: translateY(-1px); }
  .appt-card.done { background: var(--klaar-bg); border-color: var(--klaar-border); opacity: 0.7; }
  .appt-card.onderweg { border-color: var(--blue); }

  .appt-number {
    position: absolute;
    top: 10px;
    left: 12px;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--muted);
  }

  .appt-inner { padding: 10px 12px 10px 36px; }

  .appt-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 4px;
  }

  .appt-time {
    font-family: 'DM Mono', monospace;
    font-size: 14px;
    font-weight: 500;
    color: var(--accent2);
  }
  .appt-card.done .appt-time { color: var(--muted); }

  .appt-actions { display: flex; gap: 4px; align-items: center; flex-wrap: wrap; justify-content: flex-end; }

  .icon-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--muted);
    width: 28px;
    height: 28px;
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    font-size: 12px;
    transition: all 0.15s;
    text-decoration: none;
    flex-shrink: 0;
  }
  .icon-btn:hover { color: var(--text); border-color: var(--muted); }
  .icon-btn.danger:hover { color: var(--reparatie); border-color: var(--reparatie); }
  .icon-btn.ghl:hover { color: var(--blue); border-color: var(--blue); }

  .appt-name {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 14px;
    letter-spacing: -0.3px;
    margin-bottom: 2px;
  }

  .appt-address { font-size: 11px; color: var(--muted); margin-bottom: 4px; }
  .appt-desc { font-size: 11px; color: #8888aa; font-style: italic; margin-bottom: 6px; }

  /* Extra info rij */
  .appt-meta {
    display: flex;
    gap: 12px;
    margin-bottom: 6px;
    flex-wrap: wrap;
  }
  .meta-item {
    display: flex;
    flex-direction: column;
    gap: 1px;
  }
  .meta-label {
    font-family: 'DM Mono', monospace;
    font-size: 8px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .meta-value {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--text);
  }
  .appt-notes {
    font-size: 11px;
    color: var(--accent);
    background: rgba(255,107,53,0.08);
    border: 1px solid rgba(255,107,53,0.2);
    border-radius: 4px;
    padding: 4px 8px;
    margin-bottom: 6px;
  }

  .appt-footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 6px;
  }

  .appt-tags { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }

  .tag {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 1px;
    padding: 3px 7px;
    border-radius: 4px;
  }
  .tag.reparatie { background: rgba(255,107,53,0.15); color: var(--reparatie); }
  .tag.onderhoud { background: rgba(0,212,170,0.15); color: var(--onderhoud); }
  .tag.installatie { background: rgba(74,158,255,0.15); color: var(--installatie); }

  .appt-phone { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--muted); }
  .appt-price { font-family: 'DM Mono', monospace; font-size: 13px; font-weight: 500; color: var(--accent2); }
  .appt-card.done .appt-price { color: var(--muted); }

  .status-dot { display: inline-flex; align-items: center; gap: 5px; font-size: 10px; font-family: 'DM Mono', monospace; }
  .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--muted); flex-shrink: 0; }
  .dot.klaar { background: var(--accent2); }
  .dot.onderweg { background: var(--blue); animation: pulse 1.5s infinite; }

  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

  .btn-done {
    background: var(--surface3);
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 5px 10px;
    border-radius: 6px;
    font-size: 11px;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 4px;
    white-space: nowrap;
  }
  .btn-done:hover { background: rgba(0,212,170,0.1); border-color: var(--accent2); color: var(--accent2); }
  .btn-done.active { background: rgba(74,158,255,0.1); border-color: var(--blue); color: var(--blue); }

  /* COMPLETE BAR */
  .complete-bar {
    display: none;
    background: var(--surface2);
    border-top: 1px solid var(--border);
    padding: 10px 12px 10px 36px;
    flex-direction: column;
    gap: 8px;
  }
  .complete-bar.visible { display: flex; }

  .complete-row {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
  }

  .review-toggle {
    display: flex;
    align-items: center;
    gap: 8px;
    cursor: pointer;
    font-size: 11px;
    color: var(--muted);
    user-select: none;
  }

  .toggle {
    width: 32px;
    height: 18px;
    background: var(--surface3);
    border-radius: 9px;
    position: relative;
    transition: background 0.2s;
    border: 1px solid var(--border);
    flex-shrink: 0;
  }
  .toggle.on { background: var(--accent2); border-color: var(--accent2); }
  .toggle::after {
    content: '';
    position: absolute;
    width: 12px;
    height: 12px;
    background: white;
    border-radius: 50%;
    top: 2px;
    left: 2px;
    transition: left 0.2s;
  }
  .toggle.on::after { left: 16px; }

  .service-date-row {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 11px;
    color: var(--muted);
    flex-wrap: wrap;
  }

  .service-date-row input {
    background: var(--surface3);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 4px 8px;
    border-radius: 6px;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    outline: none;
  }
  .service-date-row input:focus { border-color: var(--accent); }

  .btn-confirm {
    background: var(--accent2);
    color: #0a0a0f;
    border: none;
    padding: 6px 14px;
    border-radius: 6px;
    font-family: 'DM Sans', sans-serif;
    font-weight: 500;
    font-size: 12px;
    cursor: pointer;
    margin-left: auto;
    transition: opacity 0.15s;
  }
  .btn-confirm:hover { opacity: 0.85; }

  /* ROUTE PANEL */
  .route-panel {
    padding: 16px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .btn-optimize {
    background: var(--accent);
    color: white;
    border: none;
    padding: 10px;
    border-radius: 8px;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 12px;
    cursor: pointer;
    width: 100%;
    letter-spacing: 0.5px;
    transition: opacity 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  .btn-optimize:hover { opacity: 0.85; }

  .route-list { display: flex; flex-direction: column; }

  .route-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 0;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    transition: opacity 0.15s;
  }
  .route-item:last-child { border-bottom: none; }
  .route-item:hover { opacity: 0.8; }
  .route-item.done { opacity: 0.4; }

  .route-num {
    width: 22px;
    height: 22px;
    border-radius: 50%;
    background: var(--surface3);
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    color: var(--muted);
    flex-shrink: 0;
  }
  .route-num.depot { background: rgba(255,107,53,0.15); border-color: var(--accent); color: var(--accent); font-size: 11px; }

  .route-info { flex: 1; min-width: 0; }
  .route-name { font-size: 12px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .route-addr { font-size: 10px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .route-time { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--muted); flex-shrink: 0; }

  .btn-maps, .btn-morning {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 9px;
    border-radius: 8px;
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    cursor: pointer;
    width: 100%;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    text-decoration: none;
  }
  .btn-maps:hover { border-color: var(--blue); color: var(--blue); }
  .btn-morning { color: var(--muted); }
  .btn-morning:hover { border-color: var(--accent2); color: var(--accent2); }

  /* TOTAL BAR */
  .total-bar {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 4px;
  }
  .total-label { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }
  .total-amount { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 16px; color: var(--accent2); }

  /* MODAL */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 200;
    align-items: center;
    justify-content: center;
    padding: 16px;
  }
  .modal-overlay.visible { display: flex; }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    width: 400px;
    max-width: 100%;
    max-height: 90vh;
    overflow-y: auto;
  }

  .modal-title { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 15px; margin-bottom: 14px; }
  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 14px; }
  .btn-cancel { background: var(--surface2); border: 1px solid var(--border); color: var(--muted); padding: 7px 14px; border-radius: 6px; font-family: 'DM Sans', sans-serif; font-size: 12px; cursor: pointer; }
  .btn-save { background: var(--accent); border: none; color: white; padding: 7px 14px; border-radius: 6px; font-family: 'DM Sans', sans-serif; font-weight: 500; font-size: 12px; cursor: pointer; }

  .form-row { margin-bottom: 8px; }
  .form-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; display: block; }
  .form-input, .form-select {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 7px 10px;
    border-radius: 6px;
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    transition: border-color 0.15s;
    outline: none;
  }
  .form-input:focus, .form-select:focus { border-color: var(--accent); }
  .form-select option { background: var(--surface2); }
  .form-row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 8px; }

  /* TOAST */
  .toast {
    position: fixed;
    bottom: 16px;
    right: 16px;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 10px 14px;
    border-radius: 8px;
    font-size: 12px;
    z-index: 300;
    transform: translateY(80px);
    opacity: 0;
    transition: all 0.3s;
    max-width: 280px;
    line-height: 1.5;
  }
  .toast.show { transform: translateY(0); opacity: 1; }
  .toast.success { border-color: var(--accent2); }
  .toast.info { border-color: var(--blue); }
  .toast.loading { border-color: var(--accent); }

  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* LOGIN */
  .login-overlay {
    position: fixed;
    inset: 0;
    background: var(--bg);
    z-index: 999;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 16px;
  }
  .login-overlay.hidden { display: none; }
  .login-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 32px;
    width: 340px;
    max-width: 100%;
  }
  .login-logo { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 22px; letter-spacing: -0.5px; margin-bottom: 6px; }
  .login-logo span { color: var(--accent); }
  .login-sub { font-size: 12px; color: var(--muted); margin-bottom: 28px; }
  .login-field { margin-bottom: 14px; }
  .login-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px; display: block; }
  .login-input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 10px 12px;
    border-radius: 8px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    outline: none;
    transition: border-color 0.15s;
  }
  .login-input:focus { border-color: var(--accent); }
  .login-error { font-size: 12px; color: var(--reparatie); margin-bottom: 10px; display: none; }
  .login-error.visible { display: block; }
  .btn-login {
    width: 100%;
    background: var(--accent);
    color: white;
    border: none;
    padding: 11px;
    border-radius: 8px;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 13px;
    cursor: pointer;
    transition: opacity 0.15s;
    letter-spacing: 0.5px;
    margin-top: 6px;
  }
  .btn-login:hover { opacity: 0.85; }
  .login-hint { font-size: 11px; color: var(--muted); text-align: center; margin-top: 16px; }

  /* MOBILE */
  @media (max-width: 768px) {
    header { padding: 0 10px; gap: 6px; }
    .logo { font-size: 14px; }
    .date-label { width: 140px; font-size: 10px; padding: 8px 6px; }
    .header-stats { gap: 8px; }
    .stat-val { font-size: 14px; }
    .stat-label { display: none; }

    .layout {
      grid-template-columns: 1fr;
      grid-template-rows: 1fr auto;
      height: auto;
      min-height: calc(100vh - 56px);
    }

    .appointments {
      border-right: none;
      border-bottom: 1px solid var(--border);
      height: auto;
      overflow-y: visible;
      padding: 12px;
    }

    .route-panel {
      padding: 12px;
      height: auto;
    }

    .appt-inner { padding: 10px 10px 10px 32px; }
    .appt-number { left: 10px; }
    .icon-btn { width: 32px; height: 32px; font-size: 14px; }
    .appt-name { font-size: 13px; }
    .appt-time { font-size: 13px; }

    .form-row-2 { grid-template-columns: 1fr; }

    .toast { left: 16px; right: 16px; max-width: none; }
  }

  @media (max-width: 480px) {
    .date-label { width: 120px; font-size: 9px; }
    .stat { display: none; }
    .stat:first-child { display: flex; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">HET<span>EKRAAN</span></div>
  <div class="date-nav">
    <button onclick="changeDay(-1)">‹</button>
    <div class="date-label" id="dateLabel"></div>
    <button onclick="changeDay(1)">›</button>
  </div>
  <div class="header-stats">
    <div class="stat">
      <div class="stat-val" id="totalAfspraken">0</div>
      <div class="stat-label">Afspraken</div>
    </div>
    <div class="stat">
      <div class="stat-val green" id="totalKlaar">0</div>
      <div class="stat-label">Klaar</div>
    </div>
    <div class="stat">
      <div class="stat-val orange" id="totalOmzet">€0</div>
      <div class="stat-label">Omzet dag</div>
    </div>
  </div>
</header>

<div class="layout">
  <div class="appointments">
    <div class="appointments-header">
      <div class="section-title">⬛ Afspraken van de dag</div>
      <button class="btn-add" onclick="openModal()">+ Afspraak</button>
    </div>
    <div id="apptList"></div>
    <div class="total-bar">
      <div class="total-label">Totaal dagomzet</div>
      <div class="total-amount" id="totalBar">€0</div>
    </div>
  </div>

  <div class="route-panel">
    <div class="section-title">⚡ Routevolgorde</div>
    <button class="btn-optimize" onclick="optimizeRoute()">⚡ OPTIMALISEER VOLGORDE</button>
    <div class="route-list" id="routeList"></div>
    <a class="btn-maps" href="#" onclick="openMaps(event)">🗺 Open volledige route in Maps</a>
    <button class="btn-morning" onclick="sendMorningMessages()">☀️ Stuur ochtendmeldingen</button>
  </div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-title">Nieuwe afspraak</div>
    <div class="form-row-2">
      <div>
        <label class="form-label">Tijd</label>
        <input class="form-input" type="time" id="mTime" value="09:00">
      </div>
      <div>
        <label class="form-label">Type</label>
        <select class="form-select" id="mType">
          <option>Reparatie</option>
          <option>Onderhoud</option>
          <option>Installatie</option>
        </select>
      </div>
    </div>
    <div class="form-row">
      <label class="form-label">Naam klant</label>
      <input class="form-input" type="text" id="mName" placeholder="Achternaam">
    </div>
    <div class="form-row">
      <label class="form-label">Adres</label>
      <input class="form-input" type="text" id="mAddress" placeholder="Straat 12, Amsterdam">
    </div>
    <div class="form-row-2">
      <div>
        <label class="form-label">Telefoon</label>
        <input class="form-input" type="text" id="mPhone" placeholder="06-...">
      </div>
      <div>
        <label class="form-label">Prijs (€)</label>
        <input class="form-input" type="number" id="mPrice" placeholder="0">
      </div>
    </div>
    <div class="form-row">
      <label class="form-label">Omschrijving</label>
      <input class="form-input" type="text" id="mDesc" placeholder="Kort omschrijven">
    </div>
    <div class="form-row">
      <label class="form-label">GHL Contact ID (optioneel)</label>
      <input class="form-input" type="text" id="mContactId" placeholder="GHL contact ID">
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Annuleren</button>
      <button class="btn-save" onclick="saveModal()">Toevoegen</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const DAYS = ['ZONDAG','MAANDAG','DINSDAG','WOENSDAG','DONDERDAG','VRIJDAG','ZATERDAG'];
const MONTHS = ['JAN','FEB','MRT','APR','MEI','JUN','JUL','AUG','SEP','OKT','NOV','DEC'];
const GHL_BASE_URL = 'https://app.gohighlevel.com/v2/location/KVD6wOE9g1g2V9z7Zxj7';

let currentDate = new Date();
let nextId = 100;
let appointments = [];

async function loadAppointments(date) {
  const dateStr = date.toLocaleDateString('nl-NL', {year:'numeric', month:'2-digit', day:'2-digit', timeZone:'Europe/Amsterdam'}).split('-').reverse().join('-');
  try {
    showToast('⏳ Afspraken laden...', 'loading');
    const res = await fetch(`/api/ghl?action=getAppointments&date=${dateStr}`);
    const data = await res.json();
    const events = data?.events || [];

    appointments = events.map((e, i) => {
      const start = new Date(e.startTime);
      const time = start.toLocaleTimeString('nl-NL', {hour:'2-digit', minute:'2-digit', timeZone:'Europe/Amsterdam'});
      const work = e.title || 'Werkzaamheden';
      let type = 'onderhoud';
      if (/instal|plaatsen|nieuw|monter/i.test(work)) type = 'installatie';
      if (/repar|lek|storing|kijken|nazorg|vervang/i.test(work)) type = 'reparatie';

      const address = e.parsedAddress || '';
      const price = e.parsedPrice || '0';
      const contact = e.contact || {};
      const firstName = contact.firstName || '';
      const lastName = contact.lastName || '';
      const name = (firstName + ' ' + lastName).trim() || address.split(' ')[0] || 'Klant';
      const mapsUrl = address ? `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(address)}` : '';
      const ghlUrl = e.contactId ? `${GHL_BASE_URL}/contacts/${e.contactId}` : '';

      return {
        id: i + 1,
        ghlId: e.id,
        contactId: e.contactId || '',
        ghlUrl,
        time,
        name,
        address,
        mapsUrl,
        phone: contact.phone || '',
        desc: e.parsedWork || work,
        notes: e.parsedNotes || '',
        type,
        price: parseFloat(String(price).replace(/[^0-9.]/g, '')) || 0,
        priceLabel: price && price !== '0' ? `€${price}` : '—',
        datumInstallatie: contact.customFields?.find(f => f.id === 'kYP2SCmhZ21Ig0aaLl5l')?.value || '',
        datumOnderhoud: contact.customFields?.find(f => f.id === 'hiTe3Yi5TlxheJq4bLzy')?.value || '',
        status: 'ingepland',
        review: false,
      };
    });

    if (appointments.length === 0) {
      showToast('Geen afspraken voor deze dag', 'info');
    } else {
      showToast(`✓ ${appointments.length} afspraken geladen`, 'success');
    }
  } catch(err) {
    console.warn('GHL niet bereikbaar', err);
    appointments = [];
    showToast('Kon afspraken niet laden', 'info');
  }
  render();
}

function formatDate(d) {
  return `${DAYS[d.getDay()]} ${d.getDate()} ${MONTHS[d.getMonth()]} ${d.getFullYear()}`;
}

function changeDay(dir) {
  currentDate = new Date(currentDate.getTime() + dir * 86400000);
  document.getElementById('dateLabel').textContent = formatDate(currentDate);
  loadAppointments(currentDate);
}

function calcStats() {
  const klaar = appointments.filter(a => a.status === 'klaar').length;
  const omzetKlaar = appointments.reduce((s,a) => s + (a.status==='klaar' ? a.price : 0), 0);
  const total = appointments.reduce((s,a) => s + a.price, 0);
  document.getElementById('totalAfspraken').textContent = appointments.length;
  document.getElementById('totalKlaar').textContent = klaar;
  document.getElementById('totalOmzet').textContent = '€' + omzetKlaar;
  document.getElementById('totalBar').textContent = '€' + total;
}

function render() {
  const sorted = [...appointments].sort((a,b) => a.time.localeCompare(b.time));
  document.getElementById('apptList').innerHTML = sorted.map((a,i) => {
    const isDone = a.status === 'klaar';
    const isOnderweg = a.status === 'onderweg';
    const showServiceDate = isOnderweg && a.type === 'reparatie';

    const metaItems = [];
    if (a.datumInstallatie) metaItems.push(`<div class="meta-item"><div class="meta-label">Installatie</div><div class="meta-value">${a.datumInstallatie}</div></div>`);
    if (a.datumOnderhoud) metaItems.push(`<div class="meta-item"><div class="meta-label">Laatste onderhoud</div><div class="meta-value">${a.datumOnderhoud}</div></div>`);

    return `
    <div class="appt-card ${isDone?'done':''} ${isOnderweg?'onderweg':''}" id="card-${a.id}">
      <div class="appt-number">#${i+1}</div>
      <div class="appt-inner">
        <div class="appt-top">
          <div class="appt-time">${a.time}</div>
          <div class="appt-actions">
            ${a.phone ? `<a class="icon-btn" href="tel:${a.phone}" title="Bellen">📞</a>` : ''}
            ${a.mapsUrl ? `<a class="icon-btn" href="${a.mapsUrl}" target="_blank" title="Maps">📍</a>` : ''}
            ${a.ghlUrl ? `<a class="icon-btn ghl" href="${a.ghlUrl}" target="_blank" title="Open in GHL">🔗</a>` : ''}
            <button class="icon-btn danger" onclick="deleteAppt(${a.id})" title="Verwijderen">✕</button>
          </div>
        </div>
        <div class="appt-name">${a.name.toUpperCase()}</div>
        ${a.address ? `<div class="appt-address">📍 ${a.address}</div>` : ''}
        <div class="appt-desc">${a.desc}</div>
        ${metaItems.length ? `<div class="appt-meta">${metaItems.join('')}</div>` : ''}
        ${a.notes ? `<div class="appt-notes">💬 ${a.notes}</div>` : ''}
        <div class="appt-footer">
          <div class="appt-tags">
            <span class="tag ${a.type}">${a.type}</span>
            ${a.phone ? `<span class="appt-phone">${a.phone}</span>` : ''}
          </div>
          <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;justify-content:flex-end">
            <span class="appt-price">${a.priceLabel}</span>
            <div class="status-dot">
              <div class="dot ${a.status}"></div>
              <span style="color:var(--muted);font-size:10px">${a.status}</span>
            </div>
            ${!isDone ? `<button class="btn-done ${isOnderweg?'active':''}" onclick="toggleOnderweg(${a.id})">
              ${isOnderweg ? '✓ Klaar?' : '→ Onderweg'}
            </button>` : ''}
          </div>
        </div>
      </div>

      <div class="complete-bar ${isOnderweg?'visible':''}" id="bar-${a.id}">
        <div class="complete-row">
          <label class="review-toggle" onclick="toggleReview(${a.id})">
            <div class="toggle ${a.review?'on':''}" id="tog-${a.id}"></div>
            <span>Review mail versturen (morgen)</span>
          </label>
        </div>
        ${showServiceDate ? `
        <div class="service-date-row">
          <span>Laatste onderhoud:</span>
          <input type="date" id="sdate-${a.id}" value="${a.lastService||''}" onchange="setLastService(${a.id}, this.value)">
        </div>` : ''}
        <div class="complete-row">
          <button class="btn-confirm" onclick="confirmDone(${a.id})">✓ Bevestig klaar</button>
        </div>
      </div>
    </div>`;
  }).join('');

  renderRoute(sorted);
  calcStats();
}

function renderRoute(sorted) {
  document.getElementById('routeList').innerHTML =
    `<div class="route-item">
      <div class="route-num depot">🏠</div>
      <div class="route-info"><div class="route-name">Depot / Start</div><div class="route-addr">Vaste startlocatie</div></div>
    </div>` +
    sorted.map((a,i) => `
    <div class="route-item ${a.status==='klaar'?'done':''}" onclick="scrollToCard(${a.id})">
      <div class="route-num">${i+1}</div>
      <div class="route-info">
        <div class="route-name">${a.name}</div>
        <div class="route-addr">${a.address}</div>
      </div>
      <div class="route-time">${a.time}</div>
    </div>`).join('');
}

function scrollToCard(id) {
  document.getElementById('card-'+id)?.scrollIntoView({behavior:'smooth', block:'center'});
}

function toggleOnderweg(id) {
  const a = appointments.find(x=>x.id===id);
  if (!a) return;
  a.status = a.status === 'onderweg' ? 'ingepland' : 'onderweg';
  if (a.status === 'onderweg') {
    const sorted = [...appointments].sort((a,b)=>a.time.localeCompare(b.time));
    const idx = sorted.findIndex(x=>x.id===id);
    const next = sorted.slice(idx+1).find(x=>x.status==='ingepland');
    if (next) {
      sendETA(next, a.time);
      showToast(`📱 ETA bericht verstuurd naar ${next.name}`, 'info');
    }
  }
  render();
}

function toggleReview(id) {
  const a = appointments.find(x=>x.id===id);
  if (a) { a.review = !a.review; render(); }
}

function setLastService(id, val) {
  const a = appointments.find(x=>x.id===id);
  if (a) a.lastService = val;
}

async function confirmDone(id) {
  const a = appointments.find(x=>x.id===id);
  if (!a) return;
  showToast('⏳ Bezig...', 'loading');
  if (a.contactId) {
    try {
      await fetch('/api/ghl?action=completeAppointment', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ contactId: a.contactId, type: a.type, sendReview: a.review, lastService: a.lastService || null })
      });
    } catch(e) { console.log('GHL niet bereikbaar', e); }
  }
  a.status = 'klaar';
  const msgs = ['✓ Klant afgerond', '📧 Factuur workflow getriggerd'];
  if (a.review) msgs.push('⭐ Review mail ingepland');
  showToast(msgs.join('\n'), 'success');
  render();
}

async function sendETA(nextAppt, currentTime) {
  if (!nextAppt.contactId) return;
  try {
    await fetch('/api/ghl?action=sendETA', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ contactId: nextAppt.contactId, eta: nextAppt.time })
    });
  } catch(e) {}
}

async function sendMorningMessages() {
  showToast('☀️ Ochtendmeldingen worden verstuurd...', 'info');
  const appts = appointments.filter(a => a.contactId && a.status === 'ingepland')
    .map(a => ({ contactId: a.contactId, timeFrom: a.time, timeTo: a.time }));
  if (appts.length > 0) {
    try {
      await fetch('/api/ghl?action=sendMorningMessages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ appointments: appts })
      });
    } catch(e) {}
  }
  showToast(`☀️ Verstuurd naar ${appts.length} klanten`, 'success');
}

function optimizeRoute() {
  appointments.sort((a,b) => a.time.localeCompare(b.time));
  showToast('⚡ Route geoptimaliseerd', 'success');
  render();
}

function openMaps(e) {
  e.preventDefault();
  const sorted = [...appointments].sort((a,b)=>a.time.localeCompare(b.time));
  const addrs = sorted.filter(a=>a.address).map(a=>encodeURIComponent(a.address)).join('/');
  if (addrs) window.open('https://www.google.com/maps/dir/'+addrs, '_blank');
}

function deleteAppt(id) {
  appointments = appointments.filter(x=>x.id!==id);
  render();
}

function openModal() { document.getElementById('modalOverlay').classList.add('visible'); }
function closeModal() { document.getElementById('modalOverlay').classList.remove('visible'); }

function saveModal() {
  const name = document.getElementById('mName').value.trim();
  const address = document.getElementById('mAddress').value.trim();
  if (!name||!address) { showToast('Vul naam en adres in', 'info'); return; }
  const mapsUrl = address ? `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(address)}` : '';
  appointments.push({
    id: nextId++, time: document.getElementById('mTime').value,
    name, address, mapsUrl,
    desc: document.getElementById('mDesc').value || '—',
    type: document.getElementById('mType').value.toLowerCase(),
    phone: document.getElementById('mPhone').value || '',
    price: parseInt(document.getElementById('mPrice').value)||0,
    priceLabel: '€'+(parseInt(document.getElementById('mPrice').value)||0),
    status: 'ingepland', review: false,
    contactId: document.getElementById('mContactId').value.trim(),
    ghlUrl: document.getElementById('mContactId').value.trim() ? `${GHL_BASE_URL}/contacts/${document.getElementById('mContactId').value.trim()}` : '',
    notes: '', datumInstallatie: '', datumOnderhoud: ''
  });
  closeModal();
  showToast('✓ Afspraak toegevoegd', 'success');
  render();
}

let toastTimer;
function showToast(msg, type='info') {
  const t = document.getElementById('toast');
  t.style.whiteSpace = 'pre-line';
  t.textContent = msg;
  t.className = `toast ${type} show`;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 4000);
}

// Init — automatisch naar vandaag
document.getElementById('dateLabel').textContent = formatDate(currentDate);
loadAppointments(currentDate);

// LOGIN
const USERS = { 'daan': 'wachtwoord1', 'jerry': 'wachtwoord2' };

function checkLogin() {
  const saved = sessionStorage.getItem('hk_user');
  if (saved && USERS[saved]) {
    document.getElementById('loginOverlay').classList.add('hidden');
    render();
  }
}

function doLogin() {
  const user = document.getElementById('loginUser').value.trim().toLowerCase();
  const pass = document.getElementById('loginPass').value;
  const err  = document.getElementById('loginError');
  if (USERS[user] && USERS[user] === pass) {
    sessionStorage.setItem('hk_user', user);
    document.getElementById('loginOverlay').classList.add('hidden');
    render();
  } else {
    err.classList.add('visible');
    document.getElementById('loginPass').value = '';
  }
}

document.getElementById('loginPass').addEventListener('keydown', e => {
  if (e.key === 'Enter') doLogin();
});

checkLogin();
</script>

<!-- LOGIN SCHERM -->
<div class="login-overlay" id="loginOverlay">
  <div class="login-box">
    <div class="login-logo">HET<span>EKRAAN</span></div>
    <div class="login-sub">Monteur planning — log in om verder te gaan</div>
    <div class="login-field">
      <label class="login-label">Gebruikersnaam</label>
      <input class="login-input" type="text" id="loginUser" placeholder="jouw naam" autocomplete="username">
    </div>
    <div class="login-field">
      <label class="login-label">Wachtwoord</label>
      <input class="login-input" type="password" id="loginPass" placeholder="••••••••" autocomplete="current-password">
    </div>
    <div class="login-error" id="loginError">Gebruikersnaam of wachtwoord onjuist</div>
    <button class="btn-login" onclick="doLogin()">INLOGGEN</button>
    <div class="login-hint">Problemen met inloggen? Neem contact op met Daan.</div>
  </div>
</div>

</body>
</html>
